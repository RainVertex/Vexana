name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://platform:platform@localhost:5432/platform_test?schema=public
      SESSION_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
      GITHUB_CLIENT_ID: ci-client-id
      GITHUB_CLIENT_SECRET: ci-client-secret
      GITHUB_ORG: ci-org

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Generate Prisma client
        run: yarn db:generate

      - name: Apply migrations
        run: yarn db:deploy

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Build
        run: yarn build
